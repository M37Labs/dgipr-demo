<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DGIPR Fene — Mobile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide-react@0.468.0/dist/umd/lucide-react.js"></script>
  <style>
    :root {
      --saffron: #FF9933;
      --saffron-dim: rgba(255,153,51,.14);
      --saffron-glow: rgba(255,153,51,.28);
      --black: #111111;
      --white: #FFFFFF;
      --grey: #6B7280;
      --surface: #F9F9F9;
      --surface-2: #F2F2F2;
      --border: #E8E8E8;
      --ink: #111111;
      --ink-2: #444444;
      --ink-3: #888888;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0; padding: 0;
      font-family: "Plus Jakarta Sans", sans-serif;
      background: #0C0C0C;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Desktop shell — phone frame */
    .desktop-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 700px 500px at 20% 10%, rgba(255,153,51,.09), transparent),
        radial-gradient(ellipse 600px 600px at 80% 90%, rgba(255,153,51,.05), transparent),
        linear-gradient(160deg, #111 0%, #0a0a0a 100%);
      padding: 32px 16px;
    }

    .phone-outer {
      position: relative;
      width: 393px;
      background: #1A1A1A;
      border-radius: 52px;
      padding: 12px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.08),
        0 0 0 2px rgba(0,0,0,.9),
        0 60px 120px rgba(0,0,0,.9),
        0 0 80px rgba(255,153,51,.04);
    }

    .phone-inner {
      width: 100%;
      border-radius: 42px;
      overflow: hidden;
      position: relative;
      background: var(--white);
      /* Approximate iPhone 15 aspect: 393 × 852 */
      height: 812px;
    }

    /* Side buttons */
    .phone-outer::before {
      content: "";
      position: absolute;
      left: -4px;
      top: 120px;
      width: 4px;
      height: 36px;
      background: #2a2a2a;
      border-radius: 3px 0 0 3px;
      box-shadow: 0 50px 0 #2a2a2a, 0 100px 0 #2a2a2a;
    }
    .phone-outer::after {
      content: "";
      position: absolute;
      right: -4px;
      top: 160px;
      width: 4px;
      height: 70px;
      background: #2a2a2a;
      border-radius: 0 3px 3px 0;
    }

    /* Dynamic island */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 100;
    }

    /* App chrome */
    .app-chrome {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: var(--white);
      overflow: hidden;
    }

    /* Status bar */
    .status-bar {
      height: 54px;
      padding: 14px 20px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-shrink: 0;
      background: var(--white);
      position: relative;
      z-index: 10;
    }

    .status-bar-time {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--black);
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* App header */
    .app-header {
      padding: 4px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: var(--black);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-text {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--black);
    }

    .logo-sub {
      font-size: 11px;
      color: var(--ink-3);
      font-weight: 600;
      letter-spacing: .02em;
    }

    .lang-btn {
      height: 32px;
      padding: 0 12px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      font-weight: 700;
      color: var(--ink-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all .15s ease;
    }
    .lang-btn:active { transform: scale(.96); }

    /* Scrollable content area */
    .content-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .content-area::-webkit-scrollbar { display: none; }

    /* Bottom nav */
    .bottom-nav {
      flex-shrink: 0;
      height: 72px;
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      padding: 0 4px;
      padding-bottom: 8px;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border: none;
      background: none;
      cursor: pointer;
      border-radius: 12px;
      transition: all .15s ease;
      position: relative;
    }
    .nav-item:active { transform: scale(.92); }

    .nav-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .02em;
    }

    .nav-badge {
      position: absolute;
      top: 6px;
      right: calc(50% - 18px);
      min-width: 16px;
      height: 16px;
      background: var(--saffron);
      border-radius: 99px;
      font-size: 9px;
      font-weight: 800;
      color: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }

    .stat-cell {
      flex: 1;
      padding: 12px 0;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat-cell:last-child { border-right: none; }

    .stat-value {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--black);
      line-height: 1;
    }

    .stat-label {
      font-size: 9.5px;
      font-weight: 600;
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-top: 3px;
    }

    /* Filter chips */
    .chips-row {
      display: flex;
      gap: 7px;
      padding: 11px 16px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chips-row::-webkit-scrollbar { display: none; }

    .chip {
      height: 30px;
      padding: 0 13px;
      border-radius: 99px;
      font-size: 11.5px;
      font-weight: 700;
      white-space: nowrap;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--ink-2);
      cursor: pointer;
      transition: all .15s ease;
    }
    .chip:active { transform: scale(.94); }
    .chip.active {
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
    }

    /* Document cards */
    .doc-list { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

    .doc-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      transition: all .18s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .doc-card:active { transform: scale(.98); border-color: var(--saffron); box-shadow: 0 2px 16px var(--saffron-glow); }

    .doc-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .doc-title {
      font-size: 13.5px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--black);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 5px;
    }

    .doc-meta {
      font-size: 11px;
      color: var(--ink-3);
      font-weight: 600;
    }

    .doc-actions {
      display: flex;
      gap: 7px;
      margin-top: 10px;
    }

    .btn-preview {
      flex: 1;
      height: 34px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 11.5px;
      font-weight: 700;
      color: var(--ink-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all .15s ease;
    }
    .btn-preview:active { transform: scale(.96); }

    .btn-fene {
      flex: 1;
      height: 34px;
      border-radius: 8px;
      border: none;
      background: var(--black);
      font-size: 11.5px;
      font-weight: 700;
      color: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all .15s ease;
    }
    .btn-fene:active { transform: scale(.96); background: #333; }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 7px;
      border-radius: 99px;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge-speech { background: var(--saffron); color: var(--black); }
    .badge-gr { background: var(--black); color: var(--white); }
    .badge-default { background: var(--surface-2); color: var(--ink-2); border: 1px solid var(--border); }
    .badge-access { background: transparent; border: 1px solid var(--border); color: var(--ink-3); }
    .badge-score { background: rgba(34,197,94,.12); color: #16a34a; border: 1px solid rgba(34,197,94,.25); }

    /* Bottom sheet */
    .sheet-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s ease;
    }
    .sheet-backdrop.open { opacity: 1; pointer-events: all; }

    .bottom-sheet {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: var(--white);
      border-radius: 22px 22px 0 0;
      max-height: 88%;
      z-index: 51;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32,.72,0,1);
      display: flex;
      flex-direction: column;
    }
    .bottom-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin: 10px auto 0;
    }

    .sheet-header {
      padding: 12px 20px 14px;
      border-bottom: 1px solid var(--border);
    }

    .sheet-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px 20px;
      scrollbar-width: none;
    }
    .sheet-body::-webkit-scrollbar { display: none; }

    .sheet-footer {
      padding: 12px 20px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    /* Log step */
    .log-step {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      position: relative;
    }
    .log-dot {
      width: 8px; height: 8px;
      border-radius: 99px;
      background: var(--saffron);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .log-line {
      position: absolute;
      left: 3.5px;
      top: 22px;
      bottom: -8px;
      width: 1px;
      background: var(--border);
    }
    .log-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--black);
    }
    .log-time {
      margin-left: auto;
      font-size: 10.5px;
      color: var(--ink-3);
      font-weight: 600;
    }

    /* Search */
    .search-bar-wrap {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--white);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .search-input-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0 12px;
      height: 42px;
      transition: border-color .18s ease;
    }
    .search-input-wrap:focus-within {
      border-color: var(--saffron);
      box-shadow: 0 0 0 3px var(--saffron-dim);
    }

    .search-input {
      flex: 1;
      border: none;
      background: none;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      color: var(--black);
      outline: none;
    }
    .search-input::placeholder { color: var(--ink-3); }

    /* Suggestions */
    .suggestions-row {
      display: flex;
      gap: 7px;
      padding: 10px 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .suggestions-row::-webkit-scrollbar { display: none; }

    /* Fene tab */
    .fene-hero {
      padding: 20px 18px 16px;
      background: var(--black);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .fene-hero-icon {
      width: 44px; height: 44px;
      background: var(--saffron);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .fene-hero-title {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.01em;
    }

    .fene-hero-sub {
      font-size: 11px;
      color: rgba(255,255,255,.55);
      font-weight: 500;
      margin-top: 1px;
    }

    .fene-body { padding: 16px; }

    .fene-type-row {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      scrollbar-width: none;
      margin-bottom: 14px;
    }
    .fene-type-row::-webkit-scrollbar { display: none; }

    .type-chip {
      height: 32px;
      padding: 0 13px;
      border-radius: 99px;
      font-size: 11.5px;
      font-weight: 700;
      white-space: nowrap;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--ink-2);
      cursor: pointer;
      transition: all .15s ease;
    }
    .type-chip.active {
      background: var(--saffron);
      color: var(--black);
      border-color: var(--saffron);
    }
    .type-chip:active { transform: scale(.94); }

    .fene-textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--black);
      padding: 13px;
      resize: none;
      min-height: 96px;
      outline: none;
      transition: border-color .18s ease;
    }
    .fene-textarea:focus {
      border-color: var(--saffron);
      box-shadow: 0 0 0 3px var(--saffron-dim);
    }

    .btn-generate {
      width: 100%;
      height: 48px;
      border-radius: 12px;
      border: none;
      background: var(--saffron);
      font-size: 14px;
      font-weight: 800;
      color: var(--black);
      cursor: pointer;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all .18s ease;
      box-shadow: 0 8px 20px rgba(255,153,51,.3);
    }
    .btn-generate:active { transform: scale(.97); box-shadow: 0 4px 10px rgba(255,153,51,.2); }
    .btn-generate:disabled { opacity: .6; }

    .output-card {
      margin-top: 14px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: var(--white);
    }

    .output-header {
      padding: 12px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .output-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--ink-3);
    }

    .btn-copy {
      height: 28px;
      padding: 0 10px;
      border-radius: 7px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-size: 11px;
      font-weight: 700;
      color: var(--ink-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all .15s ease;
    }
    .btn-copy:active { transform: scale(.94); }

    .output-body {
      padding: 14px;
      font-size: 12px;
      line-height: 1.65;
      color: var(--ink-2);
      font-weight: 500;
      white-space: pre-wrap;
      max-height: 240px;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .output-body::-webkit-scrollbar { display: none; }

    .sources-row {
      padding: 10px 14px 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      border-top: 1px solid var(--border);
    }

    .source-chip {
      height: 24px;
      padding: 0 9px;
      border-radius: 99px;
      background: var(--saffron-dim);
      border: 1px solid var(--saffron-glow);
      font-size: 10px;
      font-weight: 700;
      color: #b35900;
    }

    /* Notifications */
    .notif-header {
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--border);
    }
    .notif-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .notif-subtitle {
      font-size: 12px;
      color: var(--ink-3);
      font-weight: 500;
      margin-top: 2px;
    }
    .notif-list { padding: 8px 0; }

    .notif-item {
      display: flex;
      align-items: flex-start;
      gap: 13px;
      padding: 13px 18px;
      border-bottom: 1px solid rgba(0,0,0,.04);
      cursor: pointer;
      transition: background .15s ease;
    }
    .notif-item:active { background: var(--surface); }

    .notif-icon-wrap {
      width: 40px; height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .notif-body { flex: 1; }
    .notif-text { font-size: 13px; font-weight: 700; color: var(--black); line-height: 1.35; }
    .notif-time { font-size: 11px; color: var(--ink-3); font-weight: 500; margin-top: 3px; }

    .notif-dot {
      width: 8px; height: 8px;
      border-radius: 99px;
      flex-shrink: 0;
      margin-top: 5px;
    }

    /* Loading dots */
    .loading-dot { animation: blink 1.2s infinite both; }
    .loading-dot:nth-child(2) { animation-delay: .2s; }
    .loading-dot:nth-child(3) { animation-delay: .4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: .2; transform: scale(.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Label */
    .field-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--ink-3);
      margin-bottom: 7px;
    }

    /* Animate tab content */
    .tab-enter {
      animation: tabFadeIn .22s ease-out both;
    }
    @keyframes tabFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Search result */
    .search-empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--ink-3);
    }
    .search-empty-icon {
      width: 56px; height: 56px;
      background: var(--surface);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
    }

    /* Tag in detail */
    .detail-tag {
      display: inline-flex;
      height: 22px;
      padding: 0 9px;
      border-radius: 99px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      color: var(--ink-2);
      align-items: center;
    }

    /* Camera FAB in header */
    .camera-fab {
      width: 36px; height: 36px;
      border-radius: 11px;
      border: none;
      background: var(--saffron);
      color: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(255,153,51,.4);
      transition: all .15s ease;
      flex-shrink: 0;
    }
    .camera-fab:active { transform: scale(.91); }

    /* Full-screen OCR overlay */
    .ocr-screen {
      position: absolute;
      inset: 0;
      z-index: 60;
      background: var(--black);
      display: flex;
      flex-direction: column;
      transform: translateY(100%);

  // ── FENE TAB ─────────────────────────────────────────────────────────────
  function FeneTab({ t }) {
    const [activeType, setActiveType] = useState(0);
    const [query, setQuery] = useState("");
    const [generating, setGenerating] = useState(false);
    const [output, setOutput] = useState(null);
    const [copied, setCopied] = useState(false);

    function handleGenerate() {
      if (generating) return;
      setGenerating(true);
      setOutput(null);
      setTimeout(() => {
        setOutput({ text: generateFeneOutput(query, t.outputTypes[activeType]), sources: ["DOC-001", "DOC-003", "DOC-006", "DOC-024"] });
        setGenerating(false);
      }, 1800);
    }

    function handleCopy() {
      if (output) {
        navigator.clipboard?.writeText(output.text).catch(() => {});
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      }
    }

    return (
      <div className="tab-enter">
        {/* Hero */}
        <div className="fene-hero">
          <div className="fene-hero-icon">
            <Icon as={BrainCircuit} size={22} style={{ color: "var(--black)" }} />
          </div>
          <div>
            <div className="fene-hero-title">{t.feneTitle}</div>
            <div className="fene-hero-sub">{t.feneSub}</div>
          </div>
        </div>

        <div className="fene-body">
          {/* Type selector */}
          <div className="field-label">Output Type</div>
          <div className="fene-type-row">
            {t.outputTypes.map((type, i) => (

                Generating…

            <div className="output-card">

    { top: "15%", left: "4%",  width: "55%", height: "5%",  delay: 900 },
    { top: "22%", left: "4%",  width: "88%", height: "4%",  delay: 1200 },
    { top: "28%", left: "4%",  width: "65%", height: "4%",  delay: 1500 },
    { top: "35%", left: "4%",  width: "82%", height: "16%", delay: 1800 },
    { top: "53%", left: "4%",  width: "75%", height: "12%", delay: 2200 },
    { top: "68%", left: "4%",  width: "60%", height: "8%",  delay: 2600 },
    { top: "78%", left: "4%",  width: "88%", height: "10%", delay: 3000 },
  ];

  function OCRScreen({ open, onClose }) {
    // phase: landing | preview | scanning | streaming | results
    const [phase, setPhase] = useState("landing");
    const [imgSrc, setImgSrc] = useState(null);
    const [streamedText, setStreamedText] = useState("");
    const [streamProgress, setStreamProgress] = useState(0);
    const [visibleBboxes, setVisibleBboxes] = useState([]);
    const [streamDone, setStreamDone] = useState(false);
    const fileRef = useRef(null);
    const camRef = useRef(null);
    const terminalRef = useRef(null);
    const streamTimers = useRef([]);

    function resetAll() {
      streamTimers.current.forEach(clearTimeout);
      streamTimers.current = [];
      setPhase("landing");
      setImgSrc(null);
      setStreamedText("");
      setStreamProgress(0);
      setVisibleBboxes([]);
      setStreamDone(false);
    }

    function handleClose() { resetAll(); onClose(); }

    function loadFile(file) {
      if (!file) return;
      if (file.type.startsWith("image/")) {
        const r = new FileReader();
        r.onload = e => { setImgSrc(e.target.result); setPhase("preview"); };
        r.readAsDataURL(file);
      } else {
        // Non-image (PDF etc.) — go straight to scanning with placeholder
        setImgSrc(null);
        setPhase("preview");
      }
    }

    function startScan() {
      setPhase("scanning");
      setVisibleBboxes([]);

      // Schedule bounding box appearances
      OCR_BBOXES.forEach((box, i) => {
        const t = setTimeout(() => {
          setVisibleBboxes(prev => [...prev, i]);
        }, box.delay);
        streamTimers.current.push(t);
      });

      // After scan animation (~3.8s), move to streaming phase
      const t = setTimeout(() => startStreaming(), 3800);
      streamTimers.current.push(t);
    }

    function startStreaming() {
      setPhase("streaming");
      setStreamedText("");
      setStreamProgress(0);
      setStreamDone(false);

      const chars = OCR_STREAM_TEXT.split("");
      const total = chars.length;
      let i = 0;

      function tick() {
        // stream 3–6 chars per tick for realistic feel
        const burst = Math.floor(3 + Math.random() * 4);
        i = Math.min(i + burst, total);
        const chunk = chars.slice(0, i).join("");
        setStreamedText(chunk);
        setStreamProgress(Math.round((i / total) * 100));

        if (terminalRef.current) {
          terminalRef.current.scrollTop = terminalRef.current.scrollHeight;
        }

        if (i < total) {
          const delay = 18 + Math.random() * 22;
          const t = setTimeout(tick, delay);
          streamTimers.current.push(t);
        } else {
          setStreamDone(true);
          const t = setTimeout(() => setPhase("results"), 800);
          streamTimers.current.push(t);
        }
      }
      tick();
    }

    // Cleanup on unmount
    useEffect(() => () => streamTimers.current.forEach(clearTimeout), []);

    return (
      <div className={`ocr-screen ${open ? "open" : ""}`}>
        {/* Top bar */}
        <div className="ocr-topbar">
          <button className="ocr-back-btn" onClick={handleClose}>
            <Icon as={ChevronLeft} size={18} />
          </button>
          <div>
            <div className="ocr-topbar-title">
              {phase === "landing"   && "Scan Document"}
              {phase === "preview"   && "Review Image"}
              {phase === "scanning"  && "Scanning…"}
              {phase === "streaming" && "Reading Text…"}
              {phase === "results"   && "OCR Complete"}
            </div>
            <div className="ocr-topbar-sub">
              {phase === "landing"   && "Fene OCR · Powered by IntelliSense"}
              {phase === "preview"   && "Confirm image before scanning"}
              {phase === "scanning"  && "Detecting text regions"}
              {phase === "streaming" && "Extracting content · fene-ocr-v2"}
              {phase === "results"   && "Review extracted fields"}
            </div>
          </div>
          {phase === "results" && (
            <div style={{ marginLeft: "auto" }}>
              <div className="ocr-confidence-pill" style={{ background: "rgba(255,153,51,.2)", color: "var(--saffron)" }}>
                94% conf.
              </div>
            </div>
          )}
        </div>

        {/* ── LANDING ── */}
        {phase === "landing" && (
          <div className="ocr-landing">
            <div className="ocr-hero-ring">
              <Icon as={ScanText} size={38} style={{ color: "var(--saffron)" }} />
            </div>
            <div className="ocr-hero-title">Document OCR</div>
            <div className="ocr-hero-sub">
              Photograph or upload any government document. Fene reads it, extracts fields, and prepares it for archival.
            </div>
            <div className="ocr-source-btns">
              {/* Demo button — no upload needed */}
              <button className="ocr-source-btn primary" onClick={() => { setImgSrc(null); setPhase("scanning"); setVisibleBboxes([]); let stage = 0; const bboxTimers = OCR_BBOXES.map((box, i) => setTimeout(() => setVisibleBboxes(prev => [...prev, i]), box.delay)); bboxTimers.forEach(t => streamTimers.current.push(t)); const t = setTimeout(() => startStreaming(), 3800); streamTimers.current.push(t); }}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 3l14 9-14 9V3z"/></svg>
                <div>
                  <div className="ocr-source-btn-label">Run Demo Scan</div>
                  <div className="ocr-source-btn-sub">Simulate OCR on a sample GR — no upload needed</div>
                </div>
                <Icon as={ArrowRight} size={16} style={{ marginLeft: "auto" }} />
              </button>
              <button className="ocr-source-btn secondary" onClick={() => camRef.current?.click()}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                <div>
                  <div className="ocr-source-btn-label">Capture with Camera</div>
                  <div className="ocr-source-btn-sub">Point at a physical document</div>
                </div>
                <Icon as={ArrowRight} size={16} style={{ marginLeft: "auto", opacity: .5 }} />
              </button>
              <button className="ocr-source-btn secondary" onClick={() => fileRef.current?.click()}>
                <Icon as={ImageUp} size={20} />
                <div>
                  <div className="ocr-source-btn-label">Upload Image / PDF</div>
                  <div className="ocr-source-btn-sub">JPG, PNG, PDF · up to 50 MB</div>
                </div>
                <Icon as={ArrowRight} size={16} style={{ marginLeft: "auto", opacity: .5 }} />
              </button>
            </div>
            <div style={{ marginTop: 20, display: "flex", alignItems: "center", gap: "7px", color: "rgba(255,255,255,.3)", fontSize: "11px", fontWeight: 600 }}>
              <Icon as={ScanLine} size={13} style={{ color: "rgba(255,153,51,.5)" }} />
              Marathi · Hindi · English supported
            </div>
            <input ref={fileRef} type="file" accept="image/*,.pdf" style={{ display: "none" }} onChange={e => loadFile(e.target.files?.[0])} />
            <input ref={camRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }} onChange={e => loadFile(e.target.files?.[0])} />
          </div>
        )}

        {/* ── PREVIEW ── */}
        {phase === "preview" && (
          <div className="ocr-image-stage">
            <div className="ocr-image-viewport">
              {imgSrc
                ? <img className="ocr-image-el" src={imgSrc} alt="Document" />
                : (
                  <div style={{ textAlign: "center", color: "rgba(255,255,255,.35)" }}>
                    <Icon as={FileText} size={48} />
                    <div style={{ fontSize: 12, marginTop: 10, fontWeight: 600 }}>PDF ready for scanning</div>
                  </div>
                )
              }
              {/* Corner guides */}
              <div className="ocr-guide-corner tl" />
              <div className="ocr-guide-corner tr" />
              <div className="ocr-guide-corner bl" />
              <div className="ocr-guide-corner br" />
            </div>
            <div className="ocr-image-footer">
              <button className="btn-preview" style={{ flex: 1, height: 44, borderRadius: "12px" }} onClick={handleClose}>
                Retake
              </button>
              <button className="btn-fene" style={{ flex: 2, height: 44, borderRadius: "12px" }} onClick={startScan}>
                <Icon as={Scan} size={15} /> Start OCR Scan
              </button>
            </div>
          </div>
        )}

        {/* ── SCANNING (beam + bboxes over image) ── */}
        {phase === "scanning" && (
          <div className="ocr-image-stage">
            <div className="ocr-image-viewport">
              {imgSrc
                ? <img className="ocr-image-el" src={imgSrc} alt="Document" style={{ opacity: .85 }} />
                : (
                  <div style={{ textAlign: "center", color: "rgba(255,255,255,.2)" }}>
                    <Icon as={FileText} size={48} />
                  </div>
                )
              }
              {/* Scan beam */}
              <div className="ocr-scan-beam" />
              {/* Bounding boxes */}
              {OCR_BBOXES.map((box, i) =>
                visibleBboxes.includes(i) ? (
                  <div key={i} className="ocr-bbox" style={{ top: box.top, left: box.left, width: box.width, height: box.height }} />
                ) : null
              )}
              {/* Corner guides */}
              <div className="ocr-guide-corner tl" />
              <div className="ocr-guide-corner tr" />
              <div className="ocr-guide-corner bl" />
              <div className="ocr-guide-corner br" />
            </div>
            <div className="ocr-image-footer" style={{ justifyContent: "center" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "8px", color: "rgba(255,255,255,.55)", fontSize: "12px", fontWeight: 600 }}>
                <span className="loading-dot" style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--saffron)", display: "inline-block" }} />
                <span className="loading-dot" style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--saffron)", display: "inline-block" }} />
                <span className="loading-dot" style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--saffron)", display: "inline-block" }} />
                Detecting {visibleBboxes.length} text region{visibleBboxes.length !== 1 ? "s" : ""}…
              </div>
            </div>
          </div>
        )}

        {/* ── STREAMING (terminal readout) ── */}
        {phase === "streaming" && (
          <div className="ocr-running-panel">
            <div className="ocr-status-bar">
              <div className="ocr-status-dot" />
              <span className="ocr-status-text">Reading document…</span>
              <span className="ocr-status-model">fene-ocr-v2 · multilingual</span>
            </div>
            {imgSrc && (
              <div className="ocr-img-thumb">
                <img src={imgSrc} alt="" />
                <div className="ocr-img-thumb-overlay" />
              </div>
            )}
            <div className="ocr-terminal" ref={terminalRef}>
              <div className="ocr-terminal-line dim">{"// fene-ocr-v2 · text extraction stream"}</div>
              <div className="ocr-terminal-line dim">{"// document language: bilingual detected"}</div>
              <div className="ocr-terminal-line dim">&nbsp;</div>
              {streamedText}
              {!streamDone && <span className="ocr-terminal-cursor" />}
            </div>
            <div className="ocr-progress-wrap">
              <div className="ocr-progress-label">
                <span>Extracting text</span>
                <span>{streamProgress}%</span>
              </div>
              <div className="ocr-progress-track">
                <div className="ocr-progress-fill" style={{ width: `${streamProgress}%` }} />
              </div>
            </div>
          </div>
        )}

        {/* ── RESULTS ── */}
        {phase === "results" && (
          <div className="ocr-results">
            {imgSrc && (
              <div className="ocr-results-img">
                <img src={imgSrc} alt="Scanned document" />
                <div className="ocr-results-img-overlay">
                  <div className="ocr-confidence-pill">
                    <Icon as={CheckCircle2} size={12} /> 94% overall confidence
                  </div>
                </div>
              </div>
            )}
            <div className="ocr-results-body">
              {/* Extracted raw text */}
              <div className="ocr-extracted-text-box">
                <div className="ocr-extracted-text-header">
                  <span className="ocr-extracted-text-label">Extracted Text</span>
                  <button className="btn-copy" style={{ height: 24 }} onClick={() => navigator.clipboard?.writeText(OCR_STREAM_TEXT).catch(() => {})}>
                    <Icon as={Copy} size={10} /> Copy
                  </button>
                </div>
                <div className="ocr-extracted-text-body">{OCR_STREAM_TEXT}</div>
              </div>

              {/* Extracted fields */}
              <div className="ocr-fields-section">
                <div className="field-label" style={{ marginBottom: "10px", color: "var(--ink-3)" }}>Suggested Metadata</div>
                {OCR_FIELDS.map(f => (
                  <div key={f.key} className="ocr-field-row">
                    <span className="ocr-field-key">{f.key}</span>
                    <div style={{ display: "flex", alignItems: "center" }}>
                      <span className="ocr-field-val">{f.val}</span>
                      <span className={`ocr-field-conf ${f.tier}`}>{f.conf}%</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div className="ocr-results-footer">
              <button className="btn-preview" style={{ flex: 1, height: 44, borderRadius: "12px" }} onClick={resetAll}>
                Scan again
              </button>
              <button className="btn-fene" style={{ flex: 2, height: 44, borderRadius: "12px" }} onClick={handleClose}>
                <Icon as={Check} size={14} /> Archive Document
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── BOTTOM NAV ────────────────────────────────────────────────────────────
  function BottomNav({ active, setActive, t }) {
    const tabs = [
      { id: "archive", label: t.archive, icon: Archive },
      { id: "search", label: t.search, icon: Search },
      { id: "fene", label: t.fene, icon: BrainCircuit },
      { id: "notifications", label: t.notifications, icon: Bell, badge: 2 },
    ];
    return (
      <div className="bottom-nav">
        {tabs.map(tab => (
          <button
            key={tab.id}
            className="nav-item"
            onClick={() => setActive(tab.id)}
          >
            {tab.badge && <span className="nav-badge">{tab.badge}</span>}
            <Icon
              as={tab.icon}
              size={22}
              style={{ color: active === tab.id ? "#FF9933" : "var(--ink-3)" }}
            />
            <span className="nav-label" style={{ color: active === tab.id ? "#FF9933" : "var(--ink-3)" }}>
              {tab.label}
            </span>
          </button>
        ))}
      </div>
    );
  }

  // ── APP ROOT ─────────────────────────────────────────────────────────────
  function App() {
    const [lang, setLang] = useState("en");
    const [active, setActive] = useState("archive");
    const [sheetDoc, setSheetDoc] = useState(null);
    const [ocrOpen, setOcrOpen] = useState(false);
    const t = COPY[lang];

    const tabKey = `${lang}-${active}`;

    return (
      <div className="desktop-shell">
        <div className="phone-outer">
          <div className="phone-inner">
            <div className="dynamic-island" />
            <div className="app-chrome">
              <StatusBar />
              <AppHeader lang={lang} setLang={setLang} t={t} onOCR={() => setOcrOpen(true)} />
              <div className="content-area" key={tabKey}>
                {active === "archive" && <ArchiveTab t={t} openSheet={setSheetDoc} />}
                {active === "search" && <SearchTab t={t} openSheet={setSheetDoc} />}
                {active === "fene" && <FeneTab t={t} />}
                {active === "notifications" && <NotificationsTab t={t} />}
              </div>
              <BottomNav active={active} setActive={setActive} t={t} />
            </div>
            <DocSheet doc={sheetDoc} onClose={() => setSheetDoc(null)} t={t} />
            <OCRScreen open={ocrOpen} onClose={() => setOcrOpen(false)} />
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
