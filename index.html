      --surface: #111111;
      --surface-strong: #111111;
      --ink: #FFFFFF;
      --subtle: #FFFFFF;
      --line: #6B7280;

      color: var(--ink) !important;
    }

    [data-theme="dark"] .card,
    [data-theme="dark"] .surface,
    [data-theme="dark"] .page-header,
    [data-theme="dark"] table,
    [data-theme="dark"] pre,
    [data-theme="dark"] td,
    [data-theme="dark"] th {
      color: var(--ink) !important;
    }

    [data-theme="dark"] .border-b,
    [data-theme="dark"] .border-t {
      border-color: var(--line) !important;
    }

    [data-theme="dark"] .input,
    [data-theme="dark"] .select,
    [data-theme="dark"] .textarea,
    [data-theme="dark"] input,
    [data-theme="dark"] select,
    [data-theme="dark"] textarea {
      background-color: var(--surface) !important;
      color: var(--ink) !important;
      border-color: var(--line) !important;
      -webkit-text-fill-color: var(--ink) !important;
      opacity: 1 !important;
    }

    [data-theme="dark"] input::placeholder,
    [data-theme="dark"] textarea::placeholder {
      color: var(--subtle) !important;
      opacity: 1;
    }

    [data-theme="dark"] option {
      background-color: var(--black);
      color: var(--white);
    }

    [data-theme="dark"] .btn-secondary {
      background: var(--surface) !important;
      color: var(--ink) !important;
      border-color: var(--line) !important;
    }

    [data-theme="dark"] .badge-outline {
      background: var(--surface) !important;
      color: var(--ink) !important;
      border-color: var(--line) !important;
    }

    [data-theme="dark"] .badge-soft {
      color: var(--ink) !important;
    }

    * { box-sizing: border-box; }
    html, body, #root { min-height: 100%; }
    body {
      margin: 0;
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      color: var(--ink);
      background: var(--page);
      text-rendering: geometricPrecision;
    }

    .app-shell {
      min-height: 100vh;
      background:
        radial-gradient(circle at 16% 0%, rgba(255, 153, 51, .18), transparent 240px),
        linear-gradient(180deg, var(--black) 0, var(--black) 242px, var(--page) 242px, var(--page) 100%);
    }

    .label {
      color: var(--subtle);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .focus-ring:focus {
      outline: 3px solid rgba(255, 153, 51, .42);
      outline-offset: 3px;
    }

    .btn-primary {
      background: var(--saffron);
      color: var(--black);
      border: 1px solid var(--saffron);
      box-shadow: 0 10px 26px rgba(255, 153, 51, .22);
      font-weight: 800;
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line);
      font-weight: 800;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .btn-primary:hover, .btn-secondary:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(17, 17, 17, .10);
    }

    .card {
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 1px 0 rgba(17, 17, 17, .04), 0 16px 34px rgba(17, 17, 17, .055);
    }

    .surface {
      background: var(--surface-strong);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 22px 60px rgba(17, 17, 17, .10);
    }

    .page-header {
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line);
      border-left: 4px solid var(--saffron);
      box-shadow: 0 10px 30px rgba(17, 17, 17, .07);
    }

      background: linear-gradient(135deg, rgba(17,17,17,.96), rgba(17,17,17,.88));

      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 22px 58px rgba(17,17,17,.20);
    }

      font-size: 32px;
      line-height: 1.15;

      font-size: 40px;
    }

    .page-desc {
      color: var(--subtle);
    }

      color: var(--white);
    }

      background: rgba(17, 17, 17, .94);
      border: 1px solid rgba(255, 255, 255, .14);
      box-shadow: 0 18px 54px rgba(17, 17, 17, .34);
    }

    .metric-tile {
      position: relative;
      overflow: hidden;
      min-height: 104px;
    }

    .metric-tile::before {
      content: "";
      position: absolute;
      inset: 0;
      border-top: 3px solid var(--saffron);
      opacity: .92;
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge-saffron { background: var(--saffron); color: var(--black); }
    .badge-black { background: var(--black); color: var(--white); }
    .badge-grey { background: var(--grey); color: var(--white); }
    .badge-outline { background: var(--surface); color: var(--ink); border: 1px solid var(--line); }
    .badge-soft { background: rgba(255, 153, 51, .12); color: var(--ink); border: 1px solid rgba(255, 153, 51, .32); }

    .select, .input, .textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-size: 14px;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .select:focus, .input:focus, .textarea:focus {
      border-color: var(--saffron);
      box-shadow: 0 0 0 4px rgba(255, 153, 51, .14);
      outline: none;
    }

    .select { height: 44px; padding: 0 36px 0 12px; }
    .input { height: 52px; padding: 0 14px; }
    .textarea { min-height: 132px; padding: 16px; resize: vertical; }
    .textarea-compact { min-height: 96px; }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .panel-shadow { box-shadow: 0 28px 90px rgba(17, 17, 17, .22); }
    .toast { animation: toast-in .2s ease-out both; }
    .pulse-dot { animation: pulse-dot 1.1s infinite; }
    .progress-fill { transition: width .7s ease; }
    .slide-panel { transition: transform .3s ease; }
    .skeleton { background: linear-gradient(90deg, var(--line), var(--surface), var(--line)); background-size: 220% 100%; animation: shimmer 1s linear infinite; }

    .interactive-card {
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .interactive-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 153, 51, .55);
      box-shadow: 0 24px 60px rgba(17, 17, 17, .12);
    }

    .tab-button {
      min-height: 48px;
      border-radius: 8px;
      transition: background .18s ease, color .18s ease;
    }

    .tab-button:hover {
      background: rgba(255, 255, 255, .08);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: .35; transform: scale(.9); }
      50% { opacity: 1; transform: scale(1); }
    }
    @keyframes shimmer {
      from { background-position: 220% 0; }
      to { background-position: -220% 0; }
    }
  </style>

    function routeQuery(query, lang = "en", contextDocs = [], mode = "Policy Brief") {
      if (contextDocs && contextDocs.length) return buildContextualResponse(query, contextDocs, lang, mode);
      const q = query.toLowerCase();
      if (mode === "Policy Brief" && (q.includes("nashik") || q.includes("नाशिक")) && (q.includes("agri") || q.includes("farm") || q.includes("water") || q.includes("शेती") || q.includes("कृष") || q.includes("पाणी"))) {
        return { text: lang === "mr" ? responseTextMr.nashikAgriculture : responseText.nashikAgriculture, sources: ["DOC-001", "DOC-002", "DOC-003", "DOC-015"] };
      }
      if ((mode === "Scheme Summary" || mode === "Fact Sheet" || mode === "Policy Brief") && (q.includes("ladki bahin") || q.includes("women") || q.includes("mahila") || q.includes("लाडकी") || q.includes("महिला"))) {
        return { text: lang === "mr" ? responseTextMr.ladkiBahin : responseText.ladkiBahin, sources: ["DOC-006", "DOC-019"] };
      }
      if (mode === "Speech Draft" && (q.includes("speech") || q.includes("address") || q.includes("draft") || q.includes("भाषण") || q.includes("मसुदा")) && (q.includes("nashik") || q.includes("agri") || q.includes("farm") || q.includes("farmer") || q.includes("नाशिक") || q.includes("शेती") || q.includes("कृष"))) {
        return { text: lang === "mr" ? responseTextMr.speechDraft : responseText.speechDraft, sources: ["DOC-001", "DOC-002", "DOC-015"] };
      }
      return buildContextualResponse(query, contextDocs, lang, mode);
    }

    function Icon({ as: C, size = 16, className = "" }) {
      return C ? <C size={size} className={className} strokeWidth={2} /> : null;

      return new Date(date + "T00:00:00").toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });

    function fmtTime(ts) {
      return new Date(ts).toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
    }

    function typeBadgeClass(type) {

    function runSearch(query, documents) {
      const q = query.trim().toLowerCase();
      if (!q) return documents.slice(0, 5).map(doc => ({ doc, semantic: false, matched: "recent archive" }));
      const words = q.split(/\s+/).filter(Boolean);
      const exact = documents.filter(doc => {
        const hay = `${doc.title} ${doc.summary} ${doc.department} ${doc.district} ${doc.scheme} ${doc.keywords.join(" ")}`.toLowerCase();
        return words.some(w => hay.includes(w));
      });
      const semanticIds = new Set();
      let matchedKey = "";
      Object.entries(searchIndex).forEach(([key, ids]) => {
        const keyWords = key.split(/\s+/);
        if (q.includes(key) || words.some(w => keyWords.includes(w)) || keyWords.some(w => q.includes(w))) {
          ids.forEach(id => semanticIds.add(id));
          matchedKey = matchedKey || key;
        }
      });
      const byId = new Map(documents.map(doc => [doc.id, doc]));
      const semanticDocs = [...semanticIds].map(id => byId.get(id)).filter(Boolean);
      const merged = [...semanticDocs, ...exact].filter((doc, i, arr) => arr.findIndex(d => d.id === doc.id) === i);
      return (merged.length ? merged : documents.slice(0, 5)).map(doc => {
        const exactHit = exact.some(d => d.id === doc.id);
        return { doc, semantic: semanticIds.has(doc.id) && !exactHit, matched: matchedKey || words[0] || "fallback" };
      });
    }

                {selected && <Icon as={Check} />}

          <div className="mt-4 flex gap-2">
            <span className="badge badge-outline">keyword: {matched}</span>
            <span className="badge badge-outline">district match</span>
            <span className="badge badge-outline">archive date</span>
          </div>
        </article>
      );

    function highlight(text, query) {
      if (!query) return text;
      const words = query.toLowerCase().split(/\s+/).filter(w => w.length > 3).map(w => w.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
      if (!words.length) return text;
      const parts = text.split(new RegExp(`(${words.join("|")})`, "ig"));
      return parts.map((part, i) => words.some(w => part.toLowerCase() === w.replace(/\\/g, "").toLowerCase()) ? <mark key={i} style={{ background: PALETTE.saffron, color: PALETTE.black }}>{part}</mark> : part);
    }

      const [similarDocs, setSimilarDocs] = useState([]);
      const generationSteps = ["Searching archive for relevant documents...", "Extracting key data points...", "Generating structured brief..."];

        setSourceIds(feneContextIds || []);

      function generate() {
        setStatus("loading");
        setStatusStep(0);
        setTyped("");
        setOutput("");
        generationSteps.forEach((_, i) => setTimeout(() => setStatusStep(i), i * 900));
        setTimeout(() => {
          const candidateDocs = sourceIds.length
            ? sourceIds.map(id => documents.find(doc => doc.id === id)).filter(Boolean)
            : runSearch(prompt, documents).map(result => result.doc);
          const routed = routeQuery(prompt, lang, candidateDocs, mode);
          setSourceIds(routed.sources);
          setFeneContextIds(routed.sources);
          setOutput(routed.text);
          setStatus("done");
        }, 2700);
      }

      function findSimilarDocuments() {
        const combinedQuery = [
          citationQuery,
          feneUploadName.replace(/\.[^.]+$/, ""),
          citationFilters.department,
          citationFilters.district,
          citationFilters.type
        ].filter(Boolean).join(" ");
        let matches = runSearch(combinedQuery || prompt, documents).map(result => result.doc);

    function Stage({ label }) {
      const icon = label === "Archived" || label === "Signed Off" ? Check : label.includes("Flag") ? CircleAlert : label.includes("Extracting") || label.includes("Tagging") ? LoaderCircle : Clock3;
      const active = label === "Researcher Check" || label === "Archived" || label === "Signed Off" || label.includes("Flag");
      return <span className="flex items-center gap-2 font-semibold" style={{ color: active ? PALETTE.saffron : "var(--subtle)" }}><Icon as={icon} className={label.includes("Extracting") || label.includes("Tagging") ? "animate-spin" : ""} />{label}</span>;
    }

      const [openDoc, setOpenDoc] = useState(null);
      const [prompt, setPrompt] = useState("Prepare a brief on Nashik agriculture schemes for CM visit tomorrow");
      const [feneContextIds, setFeneContextIds] = useState([]);
      const [toasts, setToasts] = useState([]);
      const t = COPY[lang];

      useEffect(() => {
        if (active === "admin" && role !== "admin") setActive("archive");
      }, [role, active]);

      function toast(message) {
        const id = Date.now() + Math.random();
        setToasts(prev => [...prev, { id, message }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 2600);
      }

      function sendToFene(docOrDocs, openFene = true) {
        const docs = (Array.isArray(docOrDocs) ? docOrDocs : [docOrDocs]).filter(Boolean);
        if (!docs.length) return;
        const nextIds = [...new Set([...feneContextIds, ...docs.map(doc => doc.id)])];
        setFeneContextIds(nextIds);
        setPrompt(`Use ${docs.map(doc => `${doc.id} (${doc.title})`).join("; ")} as cited source context. Prepare a concise government brief with citations.`);
        if (openFene) setActive("fene");
        setOpenDoc(null);
        toast(`${docs.length} document${docs.length > 1 ? "s" : ""} added to Fene citation tray`);
      }

      return (
        <div className="app-shell" data-theme={theme} lang={lang === "mr" ? "mr" : "en"}>
          <NavBar active={active} setActive={setActive} role={role} setRole={setRole} theme={theme} setTheme={setTheme} lang={lang} setLang={setLang} t={t} />
          <main className="mx-auto mt-8 max-w-[1280px] px-8 pb-12">
            {active === "archive" && <ArchiveTab documents={documents} setDocuments={setDocuments} openDoc={openDoc} setOpenDoc={setOpenDoc} sendToFene={sendToFene} toast={toast} t={t} />}
            {active === "search" && <SearchTab documents={documents} setOpenDoc={setOpenDoc} addToFene={sendToFene} t={t} />}
            {active === "fene" && <FeneTab documents={documents} prompt={prompt} setPrompt={setPrompt} toast={toast} t={t} lang={lang} feneContextIds={feneContextIds} setFeneContextIds={setFeneContextIds} />}
            {active === "admin" && role === "admin" && <AdminTab toast={toast} t={t} />}
          </main>
          <Toasts toasts={toasts} />
          <DocumentDetailPanel doc={active === "search" ? openDoc : null} onClose={() => setOpenDoc(null)} sendToFene={sendToFene} toast={toast} t={t} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
